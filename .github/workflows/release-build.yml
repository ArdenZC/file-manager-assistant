name: Build Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows NSIS
            os: windows-latest
          - name: macOS DMG
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: 100k search performance test
        run: npm run test:performance

      - name: Security audit
        run: npm run security:audit

      - name: Package installers
        run: npm run build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Zen-Canvas-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zen Canvas ${{ github.ref_name }}
          body: |
            Zen Canvas unsigned public build.

            - Windows: Tauri NSIS installer
            - macOS: Tauri DMG installer
            - Branded Zen Canvas installer assets, app icon, and bilingual release/legal copy
            - Local-first SQLite FTS search, preview execution, and configurable 15/30/60/90-day restore records
            - Security posture: Tauri desktop runtime, strict content security policy, guarded move/rename operations, and npm high audit clean
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
          fail_on_unmatched_files: true
