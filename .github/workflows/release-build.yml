name: Build Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 ia32 arm64
            os: windows-latest
            dist_script: dist:win
          - name: macOS x64 arm64
            os: macos-latest
            dist_script: dist:mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: 100k search performance test
        run: npm run test:performance

      - name: Security audit
        run: npm run security:audit

      - name: Package installers
        run: npm run ${{ matrix.dist_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Zen-Canvas-${{ runner.os }}
          path: |
            dist-packages/*.exe
            dist-packages/*.dmg
            dist-packages/*.zip
            dist-packages/*.blockmap
            dist-packages/latest*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zen Canvas ${{ github.ref_name }}
          body: |
            Zen Canvas unsigned public build.

            - Windows: NSIS installer and portable zip, x64 / ia32 / arm64
            - macOS: dmg and zip, x64 / arm64
            - Branded Zen Canvas installer assets, app icon, and bilingual release/legal copy
            - Local-first SQLite FTS search, preview execution, and 15-day restore records
            - Security posture: Electron sandbox, isolated preload IPC, guarded move/rename operations, and npm high audit clean
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
          fail_on_unmatched_files: true
