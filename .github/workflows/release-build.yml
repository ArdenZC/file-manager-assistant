name: Build Release Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 ia32 arm64
            os: windows-latest
            dist_script: dist:win
          - name: macOS x64 arm64
            os: macos-latest
            dist_script: dist:mac
          - name: Linux x64 arm64
            os: ubuntu-latest
            dist_script: dist:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Security audit
        run: npm run security:audit

      - name: Package installers
        run: npm run ${{ matrix.dist_script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: file-manager-assistant-${{ runner.os }}
          path: dist-packages/**
          if-no-files-found: error
